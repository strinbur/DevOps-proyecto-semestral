server {
    listen 80;
    server_name localhost;

    # 1. Servir el contenido estático del Frontend
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # 2. Proxy Reverso para el Microservicio de Ventas
    location /api/v1/ventas {
        proxy_pass http://10.0.135.9:8080; # IP Privada EC2-Backend
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 3. Proxy Reverso para el Microservicio de Despachos
    location /api/v1/despachos {
        proxy_pass http://10.0.135.9:8081; # IP Privada EC2-Backend
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}