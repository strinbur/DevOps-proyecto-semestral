version: '3.8'

services:
  ventas:
    image: ${DOCKERHUB_USERNAME}/ventas-api:latest
    build:
      context: ./back-Ventas_SpringBoot/Springboot-API-REST
    container_name: ventas-api
    restart: always
    environment:
      DB_ENDPOINT: 10.0.159.40  # <-- ¡IP PRIVADA DE LA EC2-DATABASE!
      DB_PORT: 3306
      DB_NAME: devopsdb
      DB_USERNAME: root
      DB_PASSWORD: root
    ports:
      - "8080:8080"

  despachos:
    image: ${DOCKERHUB_USERNAME}/despachos-api:latest
    build:
      context: ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
    container_name: despachos-api
    restart: always
    environment:
      DB_ENDPOINT: 10.0.159.40  # <-- ¡IP PRIVADA DE LA EC2-DATABASE!
      DB_PORT: 3306
      DB_NAME: devopsdb
      DB_USERNAME: root
      DB_PASSWORD: root
    ports:
      - "8081:8081"