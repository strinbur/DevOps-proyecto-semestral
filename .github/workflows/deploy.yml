name: Deploy DevOps Innovatech

on:
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 068461358306.dkr.ecr.us-east-1.amazonaws.com

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./front_despacho
          push: true
          tags: ${{ env.ECR_REGISTRY }}/front:latest

      - name: Build and Push Ventas API
        uses: docker/build-push-action@v5
        with:
          context: ./back-Ventas_SpringBoot/Springboot-API-REST
          push: true
          tags: ${{ env.ECR_REGISTRY }}/back-ventas:latest

      - name: Build and Push Despachos API
        uses: docker/build-push-action@v5
        with:
          context: ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
          push: true
          tags: ${{ env.ECR_REGISTRY }}/back-despachos:latest

  deploy-infrastructure:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get ECR login password
        id: ecr-password
        run: |
          PASSWORD=$(aws ecr get-login-password --region ${{ env.AWS_REGION }})
          echo "::add-mask::$PASSWORD"
          echo "password=$PASSWORD" >> "$GITHUB_OUTPUT"

      - name: Deploy Stack via Chain-SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          debug: true
          script: |
            cd ~/proyecto
            git pull origin main

            echo "${{ steps.ecr-password.outputs.password }}" | docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}

            docker compose -f docker-compose-frontend.yml down
            docker compose -f docker-compose-frontend.yml pull
            docker compose -f docker-compose-frontend.yml up -d

            ssh -o StrictHostKeyChecking=no -i ~/clave.pem ec2-user@10.0.133.176 "
              cd ~/proyecto && \
              git pull origin main && \
              echo '${{ steps.ecr-password.outputs.password }}' | docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }} && \
              docker compose -f docker-compose-backend.yml down && \
              docker compose -f docker-compose-backend.yml pull && \
              docker compose -f docker-compose-backend.yml up -d
            "

            ssh -o StrictHostKeyChecking=no -i ~/clave.pem ec2-user@10.0.154.139 "
              cd ~ && \
              docker compose down && \
              docker compose up -d
            "