name: Deploy DevOps Innovatech

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Etapa de Compilación Automatizada en GitHub
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./front_despacho
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/frontend-app:latest

      - name: Build and Push Ventas API
        uses: docker/build-push-action@v5
        with:
          context: ./back-Ventas_SpringBoot/Springboot-API-REST
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/ventas-api:latest

      - name: Build and Push Despachos API
        uses: docker/build-push-action@v5
        with:
          context: ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/despachos-api:latest

  deploy-infrastructure:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Stack via Chain-SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }} # IP Pública de la EC2 Frontend
          username: ${{ secrets.EC2_USER }} # ec2-user
          key: ${{ secrets.EC2_SSH_KEY }} # Contenido de tu clave.pem
          script: |
            # =========================================================================
            # 🌐 1. ACTUALIZAR INSTANCIA FRONTEND
            # =========================================================================
            cd ~/proyecto
            git pull origin main
            
            # Detener y descargar la imagen limpia desde Docker Hub
            DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }} docker compose -f docker-compose-frontend.yml down
            DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }} docker compose -f docker-compose-frontend.yml pull
            DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }} docker compose -f docker-compose-frontend.yml up -d

            # =========================================================================
            # ⚙️ 2. ACTUALIZAR INSTANCIA BACKEND PRIVADA VÍA SSH
            # =========================================================================
            ssh -o StrictHostKeyChecking=no -i ~/clave.pem ec2-user@10.0.133.176 "
              cd ~/proyecto && \
              git pull origin main && \
              DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }} docker compose -f docker-compose-backend.yml down && \
              DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }} docker compose -f docker-compose-backend.yml pull && \
              DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }} docker compose -f docker-compose-backend.yml up -d
            "

            # =========================================================================
            # 🗄️ 3. ACTUALIZAR INSTANCIA DATABASE PRIVADA VÍA SSH
            # =========================================================================
            ssh -o StrictHostKeyChecking=no -i ~/clave.pem ec2-user@10.0.133.176 "
              ssh -o StrictHostKeyChecking=no -i ~/clave.pem ec2-user@10.0.154.139 \"
                cd ~ && \
                docker compose down && \
                docker compose up -d
              \"
            "